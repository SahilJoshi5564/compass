<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Compass — Travel Log</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#F4FBF6">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon-192.png">
<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap');

:root{
  --ink:#F4FBF6;
  --panel:#FFFFFF;
  --panel-2:#E7F7EC;
  --line:#D3EBDA;
  --flap:#2E6F40;
  --flap-dim:#1F4E2E;
  --teal:#68BA7F;
  --rose:#C1734A;
  --paper:#253D2C;
  --muted:#5C7566;
  --mint:#CFFFDC;
  --rust-soft:#F5E7DE;
  --radius:10px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--ink);
  color:var(--paper);
  font-family:'Poppins',sans-serif;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
.mono{font-family:'Poppins',sans-serif;font-variant-numeric:tabular-nums;letter-spacing:0.1px;}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;}

#app{max-width:640px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;padding-bottom:90px;position:relative;}

header.topbar{
  position:sticky;top:0;z-index:20;
  background:linear-gradient(180deg,var(--ink) 80%,transparent);
  padding:20px 18px 8px;
  display:flex;align-items:baseline;justify-content:space-between;
}
header.topbar .brand{
  font-family:'Poppins',sans-serif;font-weight:700;font-size:21px;letter-spacing:0.2px;color:var(--flap);
  display:flex;align-items:center;gap:9px;
}
header.topbar .brand .dot{width:9px;height:9px;background:var(--teal);border-radius:50%;}
header.topbar .actions{display:flex;gap:8px;}
header.topbar button.icon-btn{
  background:none;border:1px solid var(--line);color:var(--muted);border-radius:9px;
  width:36px;height:36px;display:flex;align-items:center;justify-content:center;
}
header.topbar button.icon-btn svg{display:block;}

main{flex:1;padding:0 18px;}

nav.tabs{
  position:sticky;bottom:0;background:var(--panel);border-top:1px solid var(--line);
  display:flex;justify-content:space-around;padding:10px 10px 14px;z-index:20;
  margin-top:20px;box-shadow:0 -2px 8px rgba(37,61,44,.06);gap:6px;
}
nav.tabs button{
  background:none;border:none;color:var(--muted);font-size:11px;font-family:'Poppins',sans-serif;font-weight:600;
  display:flex;flex-direction:column;align-items:center;gap:4px;letter-spacing:0.1px;
  padding:7px 16px;border-radius:12px;flex:1;transition:background .15s,color .15s;
}
nav.tabs button .ic{width:20px;height:20px;display:flex;align-items:center;justify-content:center;}
nav.tabs button .ic svg{width:100%;height:100%;}
nav.tabs button.active{color:var(--flap);background:var(--panel-2);}

.board{
  background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
  overflow:hidden;margin-bottom:20px;box-shadow:0 1px 4px rgba(37,61,44,.05);
}
.board-head{
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 14px;border-bottom:1px solid var(--line);
  font-family:'Poppins',sans-serif;font-weight:600;font-size:11px;letter-spacing:.6px;color:var(--flap);
  text-transform:uppercase;
}
.progress-track{height:6px;background:var(--panel-2);border-radius:3px;overflow:hidden;margin:14px 14px 0;}
.progress-fill{height:100%;background:var(--teal);border-radius:3px;}

.empty{padding:30px 14px;text-align:center;color:var(--muted);font-size:13px;line-height:1.6;}
.empty .big{color:var(--teal);margin-bottom:8px;display:flex;justify-content:center;}
.empty .big svg{width:34px;height:34px;}

h2.section-title{
  font-family:'Poppins',sans-serif;font-weight:600;font-size:11.5px;letter-spacing:.6px;text-transform:uppercase;
  color:var(--muted);margin:26px 0 10px;display:flex;justify-content:space-between;align-items:center;
  position:relative;padding-bottom:8px;
}
h2.section-title::after{content:'';position:absolute;left:0;bottom:0;width:26px;height:3px;background:var(--teal);border-radius:2px;}
h2.section-title .add{color:var(--flap);font-size:11px;letter-spacing:0.3px;text-transform:none;cursor:pointer;font-weight:600;}

/* trip cards on home */
.trip-card{
  background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
  padding:16px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;
  box-shadow:0 1px 4px rgba(37,61,44,.05);
}
.trip-card:active{border-color:var(--teal);}
.trip-card .name{font-weight:600;font-size:16.5px;color:var(--paper);}
.trip-card .dates{font-family:'Poppins',sans-serif;font-variant-numeric:tabular-nums;font-size:12.5px;color:var(--muted);margin-top:4px;display:flex;align-items:center;gap:8px;font-weight:500;}
.trip-card .tag{
  font-family:'Poppins',sans-serif;font-weight:600;font-size:9.5px;padding:2px 7px;border-radius:20px;
  text-transform:uppercase;letter-spacing:0.4px;border:1px solid var(--line);color:var(--muted);
}
.trip-card .status{
  font-family:'Poppins',sans-serif;font-weight:700;font-size:10px;padding:4px 9px;border-radius:20px;
  text-transform:uppercase;letter-spacing:0.4px;white-space:nowrap;
}
.status.active{background:var(--mint);color:var(--flap);}
.status.planned{background:var(--panel-2);color:var(--teal);}
.status.tentative{background:#EDEEE9;color:var(--muted);}
.status.past{background:#EDEEE9;color:var(--muted);}

/* checklist rows (tasks + packing) */
.check-row{display:flex;align-items:center;gap:12px;padding:13px 14px;border-bottom:1px solid var(--line);}
.check-row:last-child{border-bottom:none;}
.check-row .box{
  width:19px;height:19px;border-radius:6px;border:1.5px solid var(--line);flex:none;
  display:flex;align-items:center;justify-content:center;font-size:11px;color:#FFFFFF;background:var(--panel);
}
.check-row.done .box{background:var(--teal);border-color:var(--teal);}
.check-row.done .box::after{content:'✓';}
.check-row .info{flex:1;min-width:0;}
.check-row .info .t1{font-size:14.5px;font-weight:500;}
.check-row.done .info .t1{color:var(--muted);text-decoration:line-through;}
.check-row .info .t2{font-size:11.5px;color:var(--muted);margin-top:2px;}
.check-row .del{background:none;border:none;color:var(--muted);font-size:16px;padding:2px 4px;flex:none;}
.req-badge{font-size:8.5px;font-weight:700;color:var(--rose);background:var(--rust-soft);padding:2px 6px;border-radius:4px;text-transform:uppercase;letter-spacing:.3px;margin-left:6px;vertical-align:middle;}
.upload-chip{font-size:11.5px;font-weight:600;color:var(--flap);background:var(--panel-2);padding:7px 12px;border-radius:20px;cursor:pointer;white-space:nowrap;flex:none;}
.file-link,.map-link{display:inline-flex;align-items:center;gap:4px;color:var(--flap);font-weight:600;cursor:pointer;margin-top:3px;font-size:11.5px;}
.map-link svg,.file-link svg{flex:none;}
.flight-route{font-weight:600;color:var(--paper);}

/* generic list rows (expenses/activities) */
.row{
  background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
  padding:13px 14px;margin-bottom:9px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px;
  box-shadow:0 1px 4px rgba(37,61,44,.05);
}
.row .rmain{flex:1;min-width:0;}
.row .rmain .t1{font-weight:500;font-size:14.5px;color:var(--paper);}
.row .rmain .t2{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.5;}
.row .ramt{font-family:'Poppins',sans-serif;font-variant-numeric:tabular-nums;font-weight:700;font-size:15.5px;white-space:nowrap;color:var(--flap);}
.row .del{background:none;border:none;color:var(--muted);font-size:16px;padding:2px 4px;}
.badge{
  font-family:'Poppins',sans-serif;font-weight:600;font-size:10px;padding:3px 7px;border-radius:5px;
  text-transform:uppercase;letter-spacing:0.4px;white-space:nowrap;
}
.badge.stay{background:var(--mint);color:var(--flap);}
.badge.flight{background:var(--panel-2);color:var(--teal);}
.badge.train{background:var(--panel-2);color:var(--teal);}
.badge.activity{background:var(--rust-soft);color:var(--rose);}
.badge.transport{background:#EDEEE9;color:var(--muted);}
.badge.other{background:#EDEEE9;color:var(--muted);}

.due{font-size:9.5px;font-weight:700;padding:3px 7px;border-radius:5px;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap;flex:none;}
.due.ok{background:var(--panel-2);color:var(--muted);}
.due.soon{background:var(--rust-soft);color:var(--rose);}
.due.overdue{background:var(--rose);color:#FFFFFF;}
.expiry-warn{font-size:11px;color:var(--rose);font-weight:600;margin-top:3px;display:flex;align-items:center;gap:4px;}
.expiry-input{display:inline-block;margin-top:6px;}
.expiry-input input{background:var(--ink);border:1px solid var(--line);border-radius:6px;padding:5px 8px;font-size:12px;color:var(--paper);font-family:'Poppins',sans-serif;}
.expiry-input label{font-size:10.5px;color:var(--muted);display:block;margin-bottom:3px;}

/* backup nudge + template preview */
.backup-nudge{font-size:11.5px;color:var(--muted);font-weight:500;margin:0 0 12px;padding:7px 12px;background:var(--panel-2);border-radius:8px;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;}
.backup-nudge.stale{background:var(--rust-soft);color:var(--rose);font-weight:600;}
.nudge-actions{display:flex;gap:14px;}
.nudge-link{color:var(--flap);font-weight:600;cursor:pointer;white-space:nowrap;}
.backup-nudge.stale .nudge-link{color:var(--rose);text-decoration:underline;}
.tpl-item{display:flex;align-items:center;gap:9px;padding:8px 2px;font-size:13.5px;font-weight:500;border-bottom:1px solid var(--line);cursor:pointer;}
.tpl-item:last-child{border-bottom:none;}
.tpl-item input{width:16px;height:16px;accent-color:var(--flap);flex:none;}

/* suggestions module */
.suggest-strip{background:var(--rust-soft);border:1px solid var(--rose);border-radius:var(--radius);padding:12px 14px;margin:14px 0 6px;}
.suggest-strip .sg-head{display:flex;align-items:center;gap:7px;font-size:10.5px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--rose);margin-bottom:6px;}
.sg-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-top:1px solid rgba(193,115,74,.25);}
.sg-item:first-child{border-top:none;}
.sg-item .sg-ic{flex:none;width:19px;height:19px;color:var(--rose);margin-top:1px;}
.sg-item .sg-text{flex:1;font-size:13px;color:var(--paper);font-weight:500;line-height:1.4;cursor:pointer;}
.sg-item .sg-dismiss{flex:none;background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;padding:0 2px;line-height:1;}

/* today strip */
.today-strip{background:var(--mint);border:1px solid var(--teal);border-radius:var(--radius);padding:12px 14px;margin:14px 0 6px;}
.today-strip .ts-head{font-size:10.5px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--flap);margin-bottom:8px;}
.ts-item{display:flex;align-items:center;gap:10px;padding:5px 0;font-size:13.5px;}
.ts-item .ts-time{font-weight:700;font-size:12px;color:var(--flap);min-width:44px;font-variant-numeric:tabular-nums;display:flex;align-items:center;}
.ts-item .ts-time svg{width:15px;height:15px;}
.ts-item .ts-title{flex:1;font-weight:500;color:var(--pine,#253D2C);}
.ts-item .ts-amt{font-weight:700;color:var(--flap);font-variant-numeric:tabular-nums;}
.ts-spend{border-top:1px dashed var(--teal);margin-top:4px;padding-top:8px;}

/* activities filter + past/upcoming grouping */
.filter-row{display:flex;gap:8px;overflow-x:auto;margin:0 0 14px;padding-bottom:2px;}
.filter-row .chip{flex:none;}
.past-divider{display:flex;align-items:center;gap:10px;margin:20px 0 10px;color:var(--muted);font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;}
.past-divider::before,.past-divider::after{content:'';flex:1;height:1px;background:var(--line);}
.past-group{opacity:.55;}
.past-group .row:active{opacity:1;}

/* multi-city route timeline */
.route-board{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin-bottom:20px;box-shadow:0 1px 4px rgba(37,61,44,.05);}
.route-leg{display:flex;gap:12px;padding:4px 0;}
.route-leg .rail{display:flex;flex-direction:column;align-items:center;width:14px;flex:none;}
.route-leg .dot{width:9px;height:9px;border-radius:50%;background:var(--teal);flex:none;}
.route-leg .line{flex:1;width:2px;background:var(--line);margin:2px 0;min-height:20px;}
.route-leg:last-child .line{display:none;}
.route-leg .rinfo{flex:1;padding-bottom:14px;}
.route-leg .rcity{font-weight:600;font-size:14px;color:var(--paper);}
.route-leg .rmeta{font-size:11.5px;color:var(--muted);margin-top:2px;}

.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px;box-shadow:0 1px 4px rgba(37,61,44,.05);}
.stat .val{font-family:'Poppins',sans-serif;font-weight:700;font-size:23px;color:var(--flap);}
.stat .lbl{font-size:11px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:0.4px;font-weight:500;}

.fab{
  position:fixed;bottom:20px;right:calc(50% - 320px + 18px);z-index:30;
  width:54px;height:54px;border-radius:50%;background:var(--flap);color:#FFFFFF;
  border:none;font-size:26px;display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 20px rgba(46,111,64,.35);
}
@media (max-width:676px){.fab{right:18px;}}

.overlay{
  position:fixed;inset:0;background:rgba(37,61,44,.45);z-index:50;
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .2s;
}
.overlay.open{opacity:1;pointer-events:auto;}
.sheet{
  background:var(--panel);width:100%;max-width:640px;border-radius:18px 18px 0 0;
  padding:20px 18px calc(20px + env(safe-area-inset-bottom));
  max-height:88vh;overflow-y:auto;
  transform:translateY(20px);transition:transform .2s;
  box-shadow:0 -4px 24px rgba(37,61,44,.1);
}
.overlay.open .sheet{transform:translateY(0);}
.sheet h3{font-family:'Poppins',sans-serif;font-weight:600;font-size:18px;letter-spacing:0.1px;margin:0 0 16px;color:var(--paper);text-transform:none;display:flex;align-items:center;}
.sheet h3::before{content:'';display:inline-block;width:16px;height:3px;border-radius:2px;background:var(--teal);margin-right:9px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;letter-spacing:.2px;font-weight:500;}
.field input,.field select,.field textarea{
  width:100%;background:var(--ink);border:1px solid var(--line);border-radius:8px;
  padding:10px 12px;color:var(--paper);font-size:14px;font-family:'Poppins',sans-serif;
}
.field textarea{resize:vertical;min-height:60px;}
.field-row{display:flex;gap:10px;}
.field-row .field{flex:1;}
.sheet-actions{display:flex;gap:10px;margin-top:18px;}
.btn{flex:1;padding:12px;border-radius:9px;border:none;font-weight:600;font-size:14px;font-family:'Poppins',sans-serif;}
.btn.primary{background:var(--flap);color:#FFFFFF;}
.btn.ghost{background:none;border:1px solid var(--line);color:var(--muted);}
.chip-select{display:flex;flex-wrap:wrap;gap:8px;}
.chip{padding:7px 12px;border-radius:20px;border:1px solid var(--line);font-size:12.5px;color:var(--muted);background:none;font-family:'Poppins',sans-serif;}
.chip.active{border-color:var(--flap);color:var(--flap);background:var(--panel-2);}
.tentative-toggle{
  display:flex;align-items:center;gap:10px;padding:11px 12px;border:1px solid var(--line);
  border-radius:8px;margin-bottom:14px;background:var(--panel-2);
}
.tentative-toggle input{width:16px;height:16px;flex:none;accent-color:var(--flap);}
.tentative-toggle .txt{font-size:12.5px;color:var(--muted);line-height:1.4;}
.hidden{display:none!important;}
.dates-wrap.hidden{display:none;}

.backlink{
  color:var(--muted);font-size:14px;font-weight:600;display:inline-flex;align-items:center;gap:6px;
  margin:-6px 0 10px -8px;cursor:pointer;padding:7px 10px;border-radius:9px;transition:background .15s,color .15s;
}
.backlink svg{flex:none;}
.backlink:active{background:var(--panel-2);color:var(--flap);}
.trip-hero{margin-bottom:6px;}
.trip-hero .name{font-family:'Poppins',sans-serif;font-weight:700;font-size:24px;color:var(--paper);display:flex;align-items:center;gap:8px;}
.hero-edit{color:var(--muted);display:inline-flex;}
.trip-hero .dates{color:var(--muted);font-size:13px;margin-top:3px;display:flex;align-items:center;gap:8px;font-weight:500;}
.toast{
  position:fixed;bottom:100px;left:50%;transform:translateX(-50%);
  background:var(--paper);border:1px solid var(--paper);color:var(--ink);
  padding:10px 18px;border-radius:8px;font-size:13px;z-index:60;opacity:0;transition:opacity .25s;pointer-events:none;
  font-family:'Poppins',sans-serif;font-weight:500;
}
.toast.show{opacity:1;}
::-webkit-scrollbar{width:0;height:0;}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   COMPASS — solo travel log
   Home = trip list. Trip = pre-trip tasks, packing list,
   expenses, activities. Local-first, vanilla JS + IndexedDB.
   ============================================================ */

/* ---------------- DB layer ---------------- */
const DB_NAME='waypoint-db', DB_VERSION=4;
let db;
function openDB(){
  return new Promise((resolve,reject)=>{
    const req=indexedDB.open(DB_NAME,DB_VERSION);
    req.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains('trips')) d.createObjectStore('trips',{keyPath:'id'});
      if(!d.objectStoreNames.contains('tasks')) d.createObjectStore('tasks',{keyPath:'id'}).createIndex('tripId','tripId');
      if(!d.objectStoreNames.contains('packing')) d.createObjectStore('packing',{keyPath:'id'}).createIndex('tripId','tripId');
      if(!d.objectStoreNames.contains('expenses')) d.createObjectStore('expenses',{keyPath:'id'}).createIndex('tripId','tripId');
      if(!d.objectStoreNames.contains('activities')) d.createObjectStore('activities',{keyPath:'id'}).createIndex('tripId','tripId');
      if(!d.objectStoreNames.contains('meta')) d.createObjectStore('meta',{keyPath:'key'});
      if(!d.objectStoreNames.contains('personalTemplates')) d.createObjectStore('personalTemplates',{keyPath:'id'});
    };
    req.onsuccess=e=>{db=e.target.result;resolve(db);};
    req.onerror=e=>reject(e);
  });
}
function tx(store,mode='readonly'){return db.transaction(store,mode).objectStore(store);}
function idAll(store,tripId){
  return new Promise(res=>{
    const out=[];
    const idx = tripId!==undefined ? tx(store).index('tripId') : tx(store);
    const req = tripId!==undefined ? idx.openCursor(IDBKeyRange.only(tripId)) : idx.openCursor();
    req.onsuccess=e=>{const c=e.target.result; if(c){out.push(c.value);c.continue();} else res(out);};
  });
}
function idGet(store,id){return new Promise(res=>{const r=tx(store).get(id);r.onsuccess=()=>res(r.result);});}
function idPut(store,val){return new Promise(res=>{const r=tx(store,'readwrite').put(val);r.onsuccess=()=>res(val);});}
function idDel(store,id){return new Promise(res=>{const r=tx(store,'readwrite').delete(id);r.onsuccess=()=>res();});}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8);}

/* ---------------- icon set (simple outline, stroke=currentColor) ---------------- */
const ICONS={
  tasks:'<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6l2 2 4-4"/><path d="M11 6h10"/><path d="M3 14l2 2 4-4"/><path d="M11 14h10"/></svg>',

if(typeof pdfjsLib!=='undefined'){
  pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
}
async function extractPdfText(file){
  const buf=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:buf}).promise;
  let text='';
  for(let i=1;i<=pdf.numPages;i++){
    const page=await pdf.getPage(i);
    const content=await page.getTextContent();
    text+=content.items.map(it=>it.str).join(' ')+'\n';
  }
  return text;
}
let tesseractLoadPromise=null;
function loadTesseract(){
  if(window.Tesseract) return Promise.resolve();
  if(tesseractLoadPromise) return tesseractLoadPromise;
  tesseractLoadPromise=new Promise((resolve,reject)=>{
    const s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';
    s.onload=()=>resolve();
    s.onerror=()=>reject(new Error('Could not load the OCR library'));
    document.head.appendChild(s);
  });
  return tesseractLoadPromise;
}
async function extractImageText(file,onProgress){
  await loadTesseract();
  const worker=await Tesseract.createWorker('eng',1,{
    logger:m=>{ if(onProgress && m.status==='recognizing text') onProgress(Math.round((m.progress||0)*100)); }
  });
  try{
    const { data }=await worker.recognize(file);
    return data.text;
  } finally {
    await worker.terminate();
  }
}
const AIRLINES=['IndiGo','Air India Express','Air India','SpiceJet','Vistara','Go First','GoAir','AirAsia India','AirAsia','Akasa Air','TAP Air Portugal','TAP Portugal','Emirates','Qatar Airways','Etihad Airways','Etihad','Lufthansa','British Airways','Air France','KLM','Singapore Airlines','Thai Airways','American Airlines','United Airlines','Delta Air Lines','Delta','Turkish Airlines','Cathay Pacific','Malaysia Airlines','Qantas','ANA','Japan Airlines','Saudia','Oman Air','Sri Lankan Airlines','SriLankan'];
function escapeRegex(s){ return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }
function guessAirline(text){
  // 1. Prefer an explicitly labeled airline/carrier over an incidental mention
  let m=text.match(/\b(?:Operated\s*by|Airline|Carrier)\s*[:\-]?\s*([A-Za-z][A-Za-z .]{2,28})/i);
  if(m){
    const candidate=m[1].trim().toLowerCase();
    const hit=AIRLINES.find(a=>candidate.includes(a.toLowerCase())||a.toLowerCase().includes(candidate));
    if(hit)return hit;
  }
  // 2. Directly detect "<Name> Airlines" / "<Name> Airways" / "Air <Name>" patterns in the
  //    original (case-preserved) text — covers carriers not in our list (Frontier, Southwest,
  //    Alaska, Ryanair, etc.) without needing an exhaustive lookup table.
  m=text.match(/\b([A-Z][A-Za-z]+(?:\s[A-Z][A-Za-z]+){0,2}\s(?:Airlines|Airways))\b/);
  if(m)return m[1].replace(/\s+/g,' ').trim();
  m=text.match(/\bAir\s([A-Z][A-Za-z]{2,})\b/);
  if(m && !/^(?:Ticket|Fare|Travel|India\s*e)$/i.test(m[1]))return ('Air '+m[1]).trim();
  // 3. Fall back to the known-airline list, but with word-boundary matching only —
  //    a plain substring check lets 3-4 letter codes like "ANA" false-match inside
  //    ordinary words (e.g. "ANA" inside "Manage").
  const head=text.slice(0,1500);
  for(const a of AIRLINES){ if(new RegExp('\\b'+escapeRegex(a)+'\\b','i').test(head)) return a; }
  for(const a of AIRLINES){ if(new RegExp('\\b'+escapeRegex(a)+'\\b','i').test(text)) return a; }
  return null;
}
function guessDateISO(str){
  const months={jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12};
  let m=str.match(/\b(\d{1,2})[\s\-]([A-Za-z]{3,9})[\s,\-]+(\d{4})\b/);
  if(m){const mon=months[m[2].slice(0,3).toLowerCase()];if(mon)return m[3]+'-'+String(mon).padStart(2,'0')+'-'+String(m[1]).padStart(2,'0');}
  m=str.match(/\b(20\d{2})-(\d{2})-(\d{2})\b/);
  if(m)return m[0];
  m=str.match(/\b(\d{1,2})\/(\d{1,2})\/(20\d{2})\b/);
  if(m)return m[3]+'-'+String(m[2]).padStart(2,'0')+'-'+String(m[1]).padStart(2,'0');
  return null;
}
const DATE_PATTERN='(\\d{1,2}[\\s\\-][A-Za-z]{3,9}[\\s,\\-]+\\d{4}|\\d{4}-\\d{2}-\\d{2}|\\d{1,2}\\/\\d{1,2}\\/\\d{4})';
function guessLabeledDate(text,labels){
  for(const label of labels){
    const re=new RegExp('\\b'+label+'[^.\\n]{0,25}?'+DATE_PATTERN,'i');
    const m=text.match(re);
    if(m){const d=guessDateISO(m[1]);if(d)return d;}
  }
  return null;
}
const MONTH_RE='jan(?:uary)?|feb(?:ruary)?|mar(?:ch)?|apr(?:il)?|may|jun(?:e)?|jul(?:y)?|aug(?:ust)?|sep(?:t(?:ember)?)?|oct(?:ober)?|nov(?:ember)?|dec(?:ember)?';
const MONTHNUM={jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12};
function guessDateNearTime(text){
  // Whatever the ticket's layout, the departure date is almost always printed right next to
  // the departure time — far more reliable across providers than any specific label word,
  // and it sidesteps other dates in the document (booking/issue date, fare validity, DOB).
  const timeMatch=text.match(/\b([01]?\d|2[0-3]):([0-5]\d)\s*(?:hrs?)?\b/i);
  if(!timeMatch)return null;
  const idx=timeMatch.index;
  const near=text.slice(Math.max(0,idx-40),idx+140);

  // a) a full date (with year) right next to the time
  let d=guessDateISO(near);
  if(d)return d;

  // b) a partial date near the time (e.g. "Sun, Aug 30" — no year on a Goibibo-style ticket) —
  //    find the day+month, then look for a matching full date with a year anywhere in the doc
  let pm=near.match(new RegExp('\\b('+MONTH_RE+')\\.?\\s+(\\d{1,2})\\b','i'));
  let day,mon;
  if(pm){ mon=pm[1]; day=pm[2]; }
  else{
    pm=near.match(new RegExp('\\b(\\d{1,2})\\s+('+MONTH_RE+')\\.?\\b','i'));
    if(pm){ day=pm[1]; mon=pm[2]; }
  }
  if(day && mon){
    const monNum=MONTHNUM[mon.slice(0,3).toLowerCase()];
    if(monNum){
      const dayPad=day.padStart?day.padStart(2,'0'):('0'+day).slice(-2);
      const fullRe=new RegExp('\\b0?'+day+'[\\s,\\-]+(?:'+MONTH_RE+')[a-z]*[\\s,\\-]+(\\d{4})\\b|\\b(?:'+MONTH_RE+')[a-z]*[\\s,\\-]+0?'+day+'[\\s,\\-]+(\\d{4})\\b','i');
      const fm=text.match(fullRe);
      if(fm){ const year=fm[1]||fm[2]; return year+'-'+String(monNum).padStart(2,'0')+'-'+dayPad; }
    }
  }
  return null;
}
function guessTime(str){
  const m=str.match(/\b([01]?\d|2[0-3]):([0-5]\d)\s*(AM|PM|am|pm)?\b/);
  if(!m)return null;
  let h=parseInt(m[1],10);
  if(m[3]){const ap=m[3].toLowerCase();if(ap==='pm'&&h<12)h+=12;if(ap==='am'&&h===12)h=0;}
  return String(h).padStart(2,'0')+':'+m[2];
}
function parseBookingText(text){
  const result={type:null};
  const flat=text.replace(/\s+/g,' ');
  const hasIRCTC=/IRCTC|\bTrain\s*No\b|\bCoach\b[^.]{0,30}\bSeat\b|PNR\s*[:\-]?\s*\d{10}\b/i.test(flat);
  const hasFlightHints=/Boarding Pass|E-?Ticket|\bPNR\b|Flight\s*No|\bDeparture\b|Airlines?\b/i.test(flat)||/\b[A-Z]{3}\s*(?:-|to|→)\s*[A-Z]{3}\b/.test(flat);
  const hasHotelHints=/Check-?in|Check-?out|\bHotel\b|Room Type|Booking\.com|Agoda|Reservation/i.test(flat);
  if(hasIRCTC)result.type='train';
  else if(hasHotelHints&&!hasFlightHints)result.type='stay';
  else if(hasFlightHints)result.type='flight';

  let m=flat.match(/\bPNR\s*(?:No\.?|Number)?\s*[:\-]?\s*([A-Z0-9]{5,10})\b/i);
  if(m)result.pnr=m[1];

  if(result.type==='flight'||!result.type){
    result.airline=guessAirline(text);
    m=flat.match(/\b([A-Z]{3})\s*(?:-|to|→|—|>)\s*([A-Z]{3})\b/);
    if(m){result.from=m[1];result.to=m[2];}
    const flightDate=guessDateNearTime(flat)||guessLabeledDate(flat,['Departure(?:\\s*Date)?','Date\\s*of\\s*Journey','Travel\\s*Date','Flight\\s*Date','DOJ']);
    if(flightDate)result.date=flightDate;
  }
  if(result.type==='train'){
    m=flat.match(/\bTrain\s*(?:No\.?|Number)?\s*[:\-]?\s*(\d{4,5})\b/i);
    if(m)result.trainNumber=m[1];
    m=flat.match(/\bFrom\s*[:\-]?\s*([A-Za-z .]{3,30}?)\s+To\s*[:\-]?\s*([A-Za-z .]{3,30}?)\b/i);
    if(m){result.from=m[1].trim();result.to=m[2].trim();}
    let coach='',seat='';
    m=flat.match(/\bCoach\s*[:\-]?\s*([A-Z0-9]{1,4})\b/i); if(m)coach=m[1];
    m=flat.match(/\bSeat\s*(?:No\.?)?\s*[:\-]?\s*([\d,\s]{1,15})\b/i); if(m)seat=m[1].trim();
    if(coach||seat)result.seatNumbers=(coach?coach+' ':'')+seat;
    const journeyDate=guessDateNearTime(flat)||guessLabeledDate(flat,['Date\\s*of\\s*Journey','DOJ','Travel\\s*Date']);
    if(journeyDate)result.date=journeyDate;
  }
  if(result.type==='stay'){
    m=flat.match(/\bCheck-?in\s*[:\-]?\s*([^,;]{4,20})/i);
    if(m){const d=guessDateISO(m[1]);if(d)result.checkIn=d;}
    m=flat.match(/\bCheck-?out\s*[:\-]?\s*([^,;]{4,20})/i);
    if(m){const d=guessDateISO(m[1]);if(d)result.checkOut=d;}
    m=flat.match(/\bAddress\s*[:\-]?\s*([^\n]{8,80})/i);
    if(m)result.location=m[1].trim();
    const lines=text.split('\n').map(l=>l.trim()).filter(Boolean);
    const hotelLine=lines.find(l=>/hotel|resort|inn\b/i.test(l)&&l.length<60);
    if(hotelLine||( lines[0]&&lines[0].length<60)) result.title=hotelLine||lines[0];
  }
  if(!result.date && !result.checkIn){
    const d=guessDateISO(flat); if(d)result.date=d;
  }
  const t=guessTime(flat); if(t)result.time=t;
  return result;
}
async function handleActivityFileAttach(file){
  if(!file)return;
  pendingActivityFile=file;
  const note=document.getElementById('attach-status');
  const setNote=(msg,color)=>{if(note){note.textContent=msg;note.style.color=color;}};

  let text=null;
  let sourceLabel='file';
  try{
    if(file.type==='application/pdf'){
      setNote('Reading file…','var(--flap)');
      text=await extractPdfText(file);
      sourceLabel='PDF';
    } else if(file.type.startsWith('image/')){
      setNote('Reading image (OCR)… this can take a few seconds','var(--flap)');
      text=await extractImageText(file, pct=>setNote(`Reading image (OCR)… ${pct}%`,'var(--flap)'));
      sourceLabel='image';
    } else {
      setNote('Attached — this file type can\u2019t be auto-read, fill in details below','var(--rose)');
      return;
    }
  }catch(err){
    setNote(`Could not read this ${sourceLabel} automatically — fill in details below`,'var(--rose)');
    return;
  }

  const parsed=parseBookingText(text);
  if(!parsed.type){
    setNote(`Attached — couldn't auto-detect details from the ${sourceLabel}, fill them in below`,'var(--rose)');
    return;
  }
  pickSingle('f-type',parsed.type);
  onActivityTypeChange(parsed.type);
  const titleEl=document.getElementById('f-title');
  if(parsed.date)document.getElementById('f-date').value=parsed.date;
  if(parsed.time)document.getElementById('f-time').value=parsed.time;
  if(parsed.type==='flight'){
    if(parsed.airline)document.getElementById('f-airline').value=parsed.airline;
    if(parsed.pnr)document.getElementById('f-pnr').value=parsed.pnr;
    if(parsed.from)document.getElementById('f-from').value=parsed.from;
    if(parsed.to)document.getElementById('f-to').value=parsed.to;
    if(titleEl&&!titleEl.value&&parsed.to)titleEl.value='Flight to '+parsed.to;
  }
  if(parsed.type==='train'){
    if(parsed.from)document.getElementById('f-train-from').value=parsed.from;
    if(parsed.to)document.getElementById('f-train-to').value=parsed.to;
    if(parsed.trainNumber)document.getElementById('f-train-num').value=parsed.trainNumber;
    if(parsed.seatNumbers)document.getElementById('f-train-seat').value=parsed.seatNumbers;
    if(titleEl&&!titleEl.value&&parsed.to)titleEl.value='Train to '+parsed.to;
  }
  if(parsed.type==='stay'){
    if(parsed.location)document.getElementById('f-location').value=parsed.location;
    if(parsed.checkIn)document.getElementById('f-checkin').value=parsed.checkIn;
    if(parsed.checkOut)document.getElementById('f-checkout').value=parsed.checkOut;
    if(titleEl&&!titleEl.value&&parsed.title)titleEl.value=parsed.title;
  }
  setNote(`Filled in from the ${sourceLabel} — please double-check before saving`,'var(--teal)');
}
function tripStatus(trip){
  if(trip.tentative || !trip.startDate) return 'tentative';
  const t=todayStr();
  if(t<trip.startDate) return 'planned';
  if(t>(trip.endDate||trip.startDate)) return 'past';
  return 'active';
}
function tripDateLabel(trip){
  if(trip.tentative || !trip.startDate) return 'Tentative dates';
  if(trip.endDate) return fmtDate(trip.startDate)+' – '+fmtDate(trip.endDate);
  return fmtDate(trip.startDate);
}

let route={view:'home'};
let lastHash=null;
function nav(r){
  if(r.view!=='trip' || r.id!==route.id) activityFilter='all';
  route=r;
  const newHash=encodeURIComponent(JSON.stringify(r));
  lastHash=newHash;
  location.hash=newHash;
  render();
}
window.addEventListener('hashchange',()=>{
  if(location.hash===lastHash) return; // already handled by nav()
  try{route=JSON.parse(decodeURIComponent(location.hash.slice(1))||'{}');}catch(e){route={view:'home'};}
  if(!route.view)route={view:'home'};
  lastHash=location.hash;
  render();
});

    if(!existingProfile){

      if(withFile.file || withFile.expiryDate){
        await idPut('meta',{key:'passport',file:withFile.file,expiryDate:withFile.expiryDate||''});
      }
    }
    for(const t of oldPassportTasks) await idDel('tasks',t.id);
  }
  // old visa tasks were locked as required:true (undismissable even when not needed) — free them up
  const oldVisaTasks=allTasks.filter(t=>t.title==='Upload visa copy' && t.required===true);
  for(const t of oldVisaTasks){
    await idPut('tasks',{...t,required:false,note:'Not all destinations require one — delete if it doesn\u2019t apply'});
  }
  await idPut('meta',{key:'passportMigrated',value:true});
}

const DINING_KEYWORDS=['restaurant','cafe','café','bistro','dinner','lunch','breakfast','brunch','kitchen','trattoria','osteria','eatery',' bar','tavern','diner'];
/* ---------------- recurring-trip personal templates ---------------- */
function destinationKey(s){ return (s||'').trim().toLowerCase(); }
async function findMatchingTrips(destination){
  const key=destinationKey(destination);
  if(!key) return [];
  const all=await idAll('trips');
  return all.filter(t=>destinationKey(t.destination)===key);
}
async function getPersonalTemplateFor(destination){
  const key=destinationKey(destination);
  const all=await idAll('personalTemplates');
  return all.find(t=>t.destinationKey===key)||null;
}
function intersectLists(lists){
  const nonEmpty=lists.filter(l=>l.length);
  if(!nonEmpty.length) return [];
  if(nonEmpty.length===1) return nonEmpty[0];
  return nonEmpty[0].filter(item=>nonEmpty.every(l=>l.includes(item)));
}
async function recurringTripSuggestion(trip){
  if(!trip.destination) return null;
  const matches=await findMatchingTrips(trip.destination);
  if(matches.length<3) return null;
  const existing=await getPersonalTemplateFor(trip.destination);
  if(existing) return null;
  const id='sugg-recurring-'+destinationKey(trip.destination).replace(/[^a-z0-9]/g,'');
  if((trip.dismissedSuggestions||[]).includes(id)) return null;
  return {id, icon:ICONS.bell, text:`You've logged "${esc(trip.destination)}" ${matches.length} times — save it as your own template for next time?`, action:`openSaveTemplateConfirm('${trip.id}')`};
}
async function openSaveTemplateConfirm(tripId){
  const trip=await idGet('trips',tripId);
  const matches=await findMatchingTrips(trip.destination);
  openSheet(`
    <h3>${ICONS.bell} Save as a personal template?</h3>
    <div class="t2" style="margin-bottom:14px;line-height:1.6;">
      Looks at your ${matches.length} "${esc(trip.destination)}" trips and saves whatever packing items and tasks show up every time — so next time you create this trip, we can pre-fill it for you.
    </div>
    <div class="sheet-actions">
      <button class="btn ghost" onclick="dismissSuggestion('${tripId}','sugg-recurring-${destinationKey(trip.destination).replace(/[^a-z0-9]/g,'')}');closeSheet()">Not now</button>
      <button class="btn primary" onclick="createPersonalTemplate('${tripId}')">Save template</button>
    </div>`);
}
async function createPersonalTemplate(tripId){
  const trip=await idGet('trips',tripId);
  const matches=await findMatchingTrips(trip.destination);
  const packingLists=await Promise.all(matches.map(t=>idAll('packing',t.id).then(items=>items.map(i=>i.title))));
  const taskLists=await Promise.all(matches.map(t=>idAll('tasks',t.id).then(items=>items.filter(i=>!i.vault&&!i.required).map(i=>({title:i.title,dueOffsetDays:i.dueOffsetDays})))));
  const packingItems=intersectLists(packingLists);
  const taskTitles=intersectLists(taskLists.map(list=>list.map(t=>t.title)));
  const taskItems=taskTitles.map(title=>{
    const found=taskLists.flat().find(t=>t.title===title);
    return {title,dueOffsetDays:found?found.dueOffsetDays:undefined};
  });
  const template={
    id:uid(), destinationKey:destinationKey(trip.destination), destinationLabel:trip.destination,
    tripType:trip.tripType, purpose:trip.purpose||'leisure', packingItems, taskItems,
    createdAt:new Date().toISOString(), sourceCount:matches.length
  };
  await idPut('personalTemplates',template);
  closeSheet(); toast('Template saved — it\u2019ll offer to fill this in next time'); render();
}
async function applyPersonalTemplate(tripId,templateId){
  const template=await idGet('personalTemplates',templateId);
  if(!template) return;
  for(const title of template.packingItems){
    await idPut('packing',{id:uid(),tripId,title,done:false});
  }
  for(const item of template.taskItems){
    const task={id:uid(),tripId,title:item.title,note:'',done:false};
    if(item.dueOffsetDays) task.dueOffsetDays=item.dueOffsetDays;
    await idPut('tasks',task);
  }
  toast('Applied your saved template');
  render();
}
async function deletePersonalTemplate(id){
  await idDel('personalTemplates',id);
  toast('Template removed'); render();
}

function computeSuggestions(trip,tasks,packing,activities,expenses,passportProfile){
  const out=[];
  const t=todayStr();
  const dismissed=new Set(trip.dismissedSuggestions||[]);
  const push=(id,icon,text,tab)=>{ if(!dismissed.has(id)) out.push({id,icon,text,tab}); };
  const status=tripStatus(trip);
  const daysToStart=trip.startDate?Math.round((new Date(trip.startDate+'T00:00:00')-new Date(t+'T00:00:00'))/86400000):null;

  // 1. Dining/notable spot logged with no reservation note or attached confirmation
  activities.filter(a=>a.type==='activity' && !a.notes && !a.ticketFile && (!a.date||a.date>=t)).forEach(a=>{
    const title=(a.title||'').toLowerCase();
    if(DINING_KEYWORDS.some(k=>title.includes(k))){
      push('sugg-dine-'+a.id, ICONS.mapPin, `You added "${a.title}" — worth noting a reservation or booking time?`, 'activities');
    }
  });

  // 2. Packing list still empty close to departure (skip for quick trips — low-prep by definition)
  if(!trip.quickTrip && daysToStart!==null && daysToStart>=0 && daysToStart<=3 && packing.length===0){
    push('sugg-packing-empty', ICONS.tasks, `${esc(trip.destination)} is ${daysToStart===0?'today':'in '+daysToStart+'d'} — packing list is still empty.`, 'tasks');
  }

  // 3. Nothing planned close to departure (skip for quick trips)
  if(!trip.quickTrip && daysToStart!==null && daysToStart>=0 && daysToStart<=3 && activities.length===0){
    push('sugg-noactivities', ICONS.activities, `Nothing logged yet for ${esc(trip.destination)} — starts ${daysToStart===0?'today':'in '+daysToStart+'d'}.`, 'activities');
  }

  // 4. Pre-trip task due today or overdue
  tasks.filter(x=>!x.vault && !x.required && !x.done && x.dueOffsetDays!=null && trip.startDate).forEach(x=>{
    const due=new Date(trip.startDate+'T00:00:00'); due.setDate(due.getDate()-Number(x.dueOffsetDays));
    const d=Math.round((due-new Date(t+'T00:00:00'))/86400000);
    if(d<=0) push('sugg-task-'+x.id, ICONS.tasks, `"${esc(x.title)}" is ${d<0?'overdue':'due today'}.`, 'tasks');
  });

  // 5. Passport expiring within 6 months of return (international trips only — passport is global now)
  if(trip.tripType==='international' && passportProfile && passportProfile.expiryDate){
    const ref=trip.endDate||t;
    const days=Math.round((new Date(passportProfile.expiryDate+'T00:00:00')-new Date(ref+'T00:00:00'))/86400000);
    if(days<183) push('sugg-passport-'+trip.id, ICONS.file, `Passport valid until ${fmtDate(passportProfile.expiryDate)} — under 6 months past your return date.`, 'tasks');
  }

  // 6. International trip with only one flight logged (likely missing the return leg)
  if(trip.tripType==='international' && (status==='planned'||status==='active')){
    if(activities.filter(a=>a.type==='flight').length===1){
      push('sugg-return-flight', ICONS.plane, `Only one flight logged for an international trip — add the return flight?`, 'activities');
    }
  }

  // 7. Two activities scheduled at the exact same date + time
  const timed=activities.filter(a=>a.date&&a.time).sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time));
  for(let i=0;i<timed.length-1;i++){
    const a=timed[i], b=timed[i+1];
    if(a.date===b.date && a.time===b.time){
      push('sugg-conflict-'+a.id+'-'+b.id, ICONS.alertTriangle, `"${esc(a.title)}" and "${esc(b.title)}" are both set for ${fmtDate(a.date)} ${a.time} — worth double-checking.`, 'activities');
    }
  }

  return out;
}
function suggestionsHTML(trip,suggestions){
  if(!suggestions.length) return '';

    <div class="sg-head">${ICONS.bell} For this trip</div>`;

function todayStripHTML(trip,activities,expenses){
  if(tripStatus(trip)!=='active') return '';
  const t=todayStr();
  const stayCoversToday=a=>a.type==='stay' && ((a.checkIn&&a.checkOut)?(a.checkIn<=t&&t<a.checkOut):(a.date===t));
  const todayItems=activities.filter(a=>a.date===t && a.type!=='stay')
    .sort((a,b)=>(a.time||'').localeCompare(b.time||''));
  const tonightStay=activities.find(stayCoversToday);
  const todaySpendByCur=groupByCurrency(expenses.filter(e=>e.date===t));
  const todaySpendCurs=Object.keys(todaySpendByCur);

  if(!todayItems.length && !tonightStay && !todaySpendCurs.length) return '';
  let html=`<div class="today-strip">
    <div class="ts-head">Today</div>`;
  todayItems.forEach(a=>{
    html+=`<div class="ts-item"><span class="ts-time">${a.time?esc(a.time):'—'}</span><span class="ts-title">${esc(a.title)}</span><span class="badge ${a.type}">${a.type}</span></div>`;
  });
  if(tonightStay){
    html+=`<div class="ts-item"><span class="ts-time">🌙</span><span class="ts-title">${esc(tonightStay.title)}${tonightStay.location?` · <span class="map-link" onclick="openMaps('${esc(tonightStay.location).replace(/'/g,"\\'")}')">${ICONS.mapPin}map</span>`:''}</span><span class="badge stay">stay</span></div>`;
  }
  if(todaySpendCurs.length){
    html+=`<div class="ts-item ts-spend"><span class="ts-time">${ICONS.expenses}</span><span class="ts-title">Spent today</span><span class="ts-amt">${todaySpendCurs.map(c=>fmtMoney(todaySpendByCur[c],c)).join(' + ')}</span></div>`;
  }
  html+=`</div>`;
  return html;
}
async function renderTrip(tripId,tab){
  const trip=await idGet('trips',tripId);
  if(!trip){nav({view:'home'});return '';}
  const [tasks,packing,expenses,activities]=await Promise.all([
    idAll('tasks',tripId), idAll('packing',tripId), idAll('expenses',tripId), idAll('activities',tripId)
  ]);
  const expenseById={}; expenses.forEach(e=>{expenseById[e.id]=e;});
  activities.forEach(a=>{ if(a.expenseId && expenseById[a.expenseId]) a._linkedExpense=expenseById[a.expenseId]; });

  let body='';
  if(tab==='tasks') body=tasksTabHTML(trip,tasks,packing,(await passportCardHTML(trip))+(await visaCardHTML(trip)));
  else if(tab==='expenses') body=expensesTabHTML(trip,expenses);
  else if(tab==='activities') body=activitiesTabHTML(trip,activities);

  const suggestions=computeSuggestions(trip,tasks,packing,activities,expenses,await getPassportProfile());
  const recurring=await recurringTripSuggestion(trip);
  if(recurring) suggestions.push(recurring);

  return `
  <header class="topbar">
    <div class="backlink" onclick="nav({view:'home'})">${ICONS.chevronLeft}<span>Trips</span></div>

      <div class="dates mono">${tripDateLabel(trip)} <span class="tag">${trip.tripType||'domestic'}</span></div>
    </div>
    ${suggestionsHTML(trip,suggestions)}
    ${todayStripHTML(trip,activities,expenses)}
    ${body}
  </main>
  <nav class="tabs">
    ${tabBtn(trip.id,'tasks',ICONS.tasks,'Tasks',tab)}
    ${tabBtn(trip.id,'expenses',ICONS.expenses,'Expenses',tab)}
    ${tabBtn(trip.id,'activities',ICONS.activities,'Activities',tab)}
  </nav>
  <button class="fab" onclick="openAddFor('${tab}','${trip.id}')">+</button>
  ${sheetHTML()}

}
function tabBtn(tripId,key,icon,label,active){

/* ---- Tasks tab: pre-trip tasks + packing list ---- */
function taskDueBadge(t,trip){
  if(!t.dueOffsetDays || !trip.startDate) return '';
  const dueDate=new Date(trip.startDate+'T00:00:00');
  dueDate.setDate(dueDate.getDate()-Number(t.dueOffsetDays));
  const d=Math.round((dueDate-new Date(todayStr()+'T00:00:00'))/86400000);
  if(d<0) return `<span class="due overdue">overdue</span>`;
  if(d<=3) return `<span class="due soon">${d===0?'today':d+'d left'}</span>`;
  return `<span class="due ok">${d}d left</span>`;
}
async function passportCardHTML(trip){
  if(trip.tripType!=='international') return '';
  const p=await getPassportProfile();
  const refDate=trip.endDate||todayStr();
  let statusBlock;
  if(!p || (!p.file && !p.expiryDate)){
    statusBlock=`<div class="t2">Not on file yet</div>`;
  } else {
    const validDays=p.expiryDate?Math.round((new Date(p.expiryDate+'T00:00:00')-new Date(refDate+'T00:00:00'))/86400000):null;
    const fileLink=p.file?`<span class="file-link" onclick="viewFile('meta','passport','file')">${ICONS.file} view file</span>`:'';
    if(p.expiryDate && validDays!==null && validDays<183){
      statusBlock=`${fileLink}<div class="expiry-warn">${ICONS.file} expires ${fmtDate(p.expiryDate)} — under 6 months validity past your return date; some countries will refuse entry</div>`;
    } else if(p.expiryDate){
      statusBlock=`${fileLink}<div class="t2">Valid until ${fmtDate(p.expiryDate)}</div>`;
    } else {
      statusBlock=`${fileLink}<div class="t2">No expiry date on file</div>`;
    }
  }
  return `<div class="board" style="margin-bottom:14px;">
    <div class="check-row">
      <div class="box" style="${p&&(p.file||p.expiryDate)?'background:var(--teal);border-color:var(--teal);':''}">${p&&(p.file||p.expiryDate)?'✓':''}</div>
      <div class="info"><div class="t1">Passport<span class="req-badge">on file, not per-trip</span></div>${statusBlock}</div>
      <span class="upload-chip" onclick="openPassportForm()">${p&&(p.file||p.expiryDate)?'Update':'Add'}</span>
    </div>
  </div>`;
}
function tasksTabHTML(trip,tasks,packing,passportHTML){
  const doneT=tasks.filter(t=>t.done).length;
  const doneP=packing.filter(p=>p.done).length;
  let html=`<h2 class="section-title">Pre-trip tasks <span class="add" onclick="openTaskAddChoice('${trip.id}')">+ add</span></h2>`;
  html+=passportHTML||'';
  html+=`<div class="board">`;
  if(tasks.length===0){
    html+=`<div class="empty">No tasks yet — visa, insurance, SIM, that sort of thing.</div>`;
  } else {
    html+=`<div class="board-head"><span>Checklist</span><span>${doneT} / ${tasks.length} done</span></div>`;
    html+=`<div class="progress-track"><div class="progress-fill" style="width:${tasks.length?(doneT/tasks.length*100).toFixed(0):0}%"></div></div>`;
    tasks.sort((a,b)=>{
      const av=!!(a.vault||a.required), bv=!!(b.vault||b.required);
      if(av!==bv) return av?-1:1;

        html+=`<div class="check-row ${t.done?'done':''}">

          ${!t.required?`<button class="del" onclick="deleteItem('tasks','${t.id}')">&times;</button>`:''}
        </div>`;
      } else {
        html+=`<div class="check-row ${t.done?'done':''}">
          <button class="box" onclick="toggleItem('tasks','${t.id}',${!t.done})"></button>
          <div class="info" onclick="openTaskForm('${trip.id}','${t.id}')" style="cursor:pointer;"><div class="t1">${esc(t.title)}</div>${t.note?`<div class="t2">${esc(t.note)}</div>`:''}</div>
          ${!t.done?taskDueBadge(t,trip):''}
        </div>`;
      }
    });
  }
  html+=`</div>`;

  html+=`<h2 class="section-title">Packing list <span class="add" onclick="openPackingAddChoice('${trip.id}')">+ add</span></h2>`;
  html+=`<div class="board">`;
  if(packing.length===0){
    html+=`<div class="empty">No items yet — start with the essentials, or use a template above.</div>`;
  } else {
    html+=`<div class="board-head"><span>Checklist</span><span>${doneP} / ${packing.length} packed</span></div>`;
    html+=`<div class="progress-track"><div class="progress-fill" style="width:${packing.length?(doneP/packing.length*100).toFixed(0):0}%"></div></div>`;
    packing.sort((a,b)=>(a.done===b.done)?0:(a.done?1:-1)).forEach(p=>{
      html+=`<div class="check-row ${p.done?'done':''}">
        <button class="box" onclick="toggleItem('packing','${p.id}',${!p.done})"></button>
        <div class="info" onclick="openPackingForm('${trip.id}','${p.id}')" style="cursor:pointer;"><div class="t1">${esc(p.title)}</div></div>
      </div>`;
    });
  }
  html+=`</div>`;
  return html;
}

/* ---- Expenses tab ---- */
function expensesTabHTML(trip,expenses){
  expenses=expenses.sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const totals=groupByCurrency(expenses);
  const currencies=Object.keys(totals);
  const status=tripStatus(trip);
  let days=null;
  if(trip.startDate && (status==='active'||status==='past')){
    const endRef = status==='active' ? todayStr() : trip.endDate||todayStr();
    days=Math.max(1,Math.round((new Date(endRef+'T00:00:00')-new Date(trip.startDate+'T00:00:00'))/86400000)+1);
  }
  let html=`<div style="display:flex;justify-content:flex-end;margin-bottom:10px;">
    <span class="add" onclick="exportExpensesCSV('${trip.id}')">${ICONS.download} Export CSV</span>
  </div>`;
  if(currencies.length<=1){
    const cur=currencies[0]||trip.baseCurrency||'INR';
    const total=totals[cur]||0;
    const dailyAvgHTML = days
      ? `<div class="stat"><div class="val mono">${fmtMoney(total/days,cur)}</div><div class="lbl">daily average</div></div>`
      : `<div class="stat"><div class="val mono">${expenses.length}</div><div class="lbl">entries logged</div></div>`;
    html+=`<div class="stat-grid">
      <div class="stat"><div class="val mono">${fmtMoney(total,cur)}</div><div class="lbl">total spend</div></div>
      ${dailyAvgHTML}
    </div>`;
  } else {
    html+=`<div class="board" style="padding:14px;margin-bottom:20px;">
      <div class="board-head" style="padding:0 0 10px;border:none;">Total spend — ${currencies.length} currencies</div>
      ${currencies.map(c=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-top:1px solid var(--line);">
        <span style="font-weight:600;">${c}</span>
        <span style="text-align:right;">
          <span class="mono" style="font-weight:700;color:var(--flap);display:block;">${fmtMoney(totals[c],c)}</span>
          ${days?`<span class="t2" style="margin:0;">${fmtMoney(totals[c]/days,c)}/day</span>`:''}
        </span>
      </div>`).join('')}
    </div>`;
  }
  if(expenses.length===0) return html+`<div class="board"><div class="empty">No expenses logged yet.</div></div>`;
  expenses.forEach(e=>{
    html+=`<div class="row" onclick="openExpenseForm('${trip.id}','${e.id}')" style="cursor:pointer;">
      <div class="rmain">
        <div class="t1">${esc(e.note||catLabel(e.category))}</div>
        <div class="t2">${fmtDate(e.date)} · ${catLabel(e.category)}${e.activityId?` · <span class="file-link" style="display:inline-flex;">${ICONS.file} linked</span>`:''}${e.receipt?` · <span class="file-link" style="display:inline-flex;" onclick="event.stopPropagation();viewFile('expenses','${e.id}','receipt')">${ICONS.file} receipt</span>`:''}</div>
      </div>
      <div style="text-align:right;">
        <div class="ramt mono">${fmtMoney(e.amount,e.currency||trip.baseCurrency||'INR')}</div>
      </div>
    </div>`;
  });
  return html;
}

/* ---- Activities tab ---- */
function routeTimelineHTML(activities){
  const legs=activities.filter(a=>(a.type==='flight'||a.type==='train'||a.type==='transport') && (a.from||a.to))
    .sort((a,b)=>(a.date||'').localeCompare(b.date||'')||(a.time||'').localeCompare(b.time||''));
  if(legs.length<2) return '';
  let html=`<h2 class="section-title">Route</h2><div class="route-board">`;
  const legLabel=leg=>leg.type==='flight'?'Flight':leg.type==='train'?'Train':(leg.transportMode||'Transport');
  legs.forEach((leg,i)=>{
    html+=`<div class="route-leg">
      <div class="rail"><div class="dot"></div><div class="line"></div></div>
      <div class="rinfo">
        <div class="rcity">${esc(leg.from||'?')} → ${esc(leg.to||'?')}</div>
        <div class="rmeta">${legLabel(leg)}${leg.date?' · '+fmtDate(leg.date):''}${leg.time?' · '+esc(leg.time):''}${leg.type==='train'&&leg.trainNumber?' · #'+esc(leg.trainNumber):''}${leg.type==='flight'&&leg.airline?' · '+esc(leg.airline):''}</div>
      </div>
    </div>`;
  });
  html+=`</div>`;
  return html;
}
let activityFilter='all';
function setActivityFilter(f){activityFilter=f;render();}
const FILTER_DEFS={
  all:{label:'All',match:()=>true},
  transit:{label:'Transit',match:a=>['flight','train','transport'].includes(a.type)},
  stays:{label:'Stays',match:a=>a.type==='stay'},
  todo:{label:'Things to do',match:a=>['activity','other'].includes(a.type)}
};
function activityRowHTML(a){
  let extra='';
  if(a.type==='flight' && (a.from||a.to||a.airline||a.pnr)){
    extra+=`<div class="t2">`;
    if(a.from||a.to) extra+=`<span class="flight-route">${esc(a.from||'?')} → ${esc(a.to||'?')}</span>`;
    if(a.airline) extra+=`${a.from||a.to?' · ':''}${esc(a.airline)}`;
    if(a.pnr) extra+=` · PNR ${esc(a.pnr)}`;
    extra+=`</div>`;
  }
  if(a.type==='train' && (a.from||a.to||a.trainNumber||a.seatNumbers)){
    extra+=`<div class="t2">`;
    if(a.from||a.to) extra+=`<span class="flight-route">${esc(a.from||'?')} → ${esc(a.to||'?')}</span>`;
    if(a.trainNumber) extra+=`${a.from||a.to?' · ':''}#${esc(a.trainNumber)}`;
    if(a.seatNumbers) extra+=` · Seat ${esc(a.seatNumbers)}`;
    extra+=`</div>`;
  }
  if(a.type==='stay' && a.location){
    extra+=`<div class="t2"><span class="map-link" onclick="openMaps('${esc(a.location).replace(/'/g,"\\'")}')">${ICONS.mapPin}${esc(a.location)}</span></div>`;
  }
  if(a.type==='transport' && (a.from||a.to||a.transportMode||a.bookingRef)){
    extra+=`<div class="t2">`;
    if(a.from||a.to) extra+=`<span class="flight-route">${esc(a.from||'?')} → ${esc(a.to||'?')}</span>`;
    if(a.transportMode) extra+=`${a.from||a.to?' · ':''}${esc(a.transportMode)}`;

    extra+=`<span class="file-link" onclick="viewFile('activities','${a.id}','ticketFile')">${ICONS.file} view ${a.type==='stay'?'confirmation':'ticket'}</span>`;
  }
  if(a._linkedExpense){
    extra+=`<div class="t2" style="color:var(--flap);font-weight:600;">${fmtMoney(a._linkedExpense.amount,a._linkedExpense.currency)} logged to Expenses</div>`;
  }
  if(a.date || (a.type==='stay' && a.checkIn)){
    extra+=`<span class="file-link" onclick="event.stopPropagation();exportActivityICS('${a.id}')">${ICONS.calendar} add to calendar</span>`;
  }

    <div class="rmain">
      <div class="t1">${esc(a.title)}</div>
      <div class="t2">${a.date?fmtDate(a.date):'no date set'}${a.time?' · '+esc(a.time):''}</div>
      ${extra}
      ${a.notes?`<div class="t2">${esc(a.notes)}</div>`:''}
    </div>
    <div style="text-align:right;">
      <span class="badge ${a.type||'other'}">${a.type||'other'}</span>

}
function activitiesTabHTML(trip,activities){
  if(activities.length===0) return `<div class="board"><div class="empty"><div class="big">${ICONS.activities}</div>Log flights, trains, stays, tours &amp; plans here.</div></div>`;

  let html=`<div style="display:flex;justify-content:flex-end;margin-bottom:10px;">
    <span class="add" onclick="exportTripICS('${trip.id}')">${ICONS.calendarPlus} Export itinerary</span>
  </div>`;
  html+=routeTimelineHTML(activities);

  // filter chip row
  html+=`<div class="filter-row">`;
  Object.entries(FILTER_DEFS).forEach(([key,def])=>{
    const count=key==='all'?activities.length:activities.filter(def.match).length;
    if(key!=='all' && count===0) return; // hide empty filters
    html+=`<button class="chip ${activityFilter===key?'active':''}" onclick="setActivityFilter('${key}')">${def.label}${key!=='all'?' · '+count:''}</button>`;
  });
  html+=`</div>`;

  const def=FILTER_DEFS[activityFilter]||FILTER_DEFS.all;
  const filtered=activities.filter(def.match);
  if(filtered.length===0) return html+`<div class="board"><div class="empty">Nothing in this category yet.</div></div>`;

  const t=todayStr();
  const isPast=a=>a.date && a.date<t;
  // upcoming & undated: soonest first, undated last; past: most recent first
  const upcoming=filtered.filter(a=>!isPast(a)).sort((a,b)=>{
    if(!a.date&&!b.date) return 0;
    if(!a.date) return 1;
    if(!b.date) return -1;
    return a.date.localeCompare(b.date)||(a.time||'').localeCompare(b.time||'');
  });
  const past=filtered.filter(isPast).sort((a,b)=>b.date.localeCompare(a.date)||(b.time||'').localeCompare(a.time||''));

  upcoming.forEach(a=>{html+=activityRowHTML(a);});
  if(past.length){
    html+=`<div class="past-divider"><span>Past</span></div>`;
    html+=`<div class="past-group">`;
    past.forEach(a=>{html+=activityRowHTML(a);});
    html+=`</div>`;
  }
  return html;
}

      <button class="btn primary" onclick="saveTrip('${tripId||''}')">${editing?'Save changes':'Create trip'}</button>

async function saveTrip(tripId){
  const destination=document.getElementById('f-dest').value.trim();
  const tripType=pickedSingle['f-type']||'domestic';
  const purpose=pickedSingle['f-purpose']||'leisure';
  const destinationCountry=tripType==='international'?(document.getElementById('f-country').value||''):'';
  const tentative=document.getElementById('f-tentative').checked;
  const start=document.getElementById('f-start').value;
  const end=document.getElementById('f-end').value;
  const cur=document.getElementById('f-cur').value.trim().toUpperCase()||'INR';
  const quickTrip=document.getElementById('f-quick').checked;
  if(!destination){toast('Add a destination first');return;}
  if(!tentative && !start){toast('Add a start date, or mark as tentative');return;}
  const existing=tripId?await idGet('trips',tripId):null;
  const wasInternational=existing&&existing.tripType==='international';
  const trip={
    id:tripId||uid(),destination,tripType,purpose,destinationCountry,quickTrip,
    tentative: tentative || !start,
    startDate: tentative?'':start,
    endDate: tentative?'':end,
    baseCurrency:cur,
    createdAt:existing?existing.createdAt:new Date().toISOString()
  };
  await idPut('trips',trip);
  let appliedTemplate=false;
  if(!existing){
    if(tripType==='international'){
      await idPut('tasks',{id:uid(),tripId:trip.id,title:'Upload visa copy',note:'Not all destinations require one — delete if it doesn\u2019t apply',done:false,vault:true,required:false});
    }
    if(!quickTrip){
      await idPut('tasks',{id:uid(),tripId:trip.id,title:'Upload travel insurance',note:'Suggested — remove if not needed',done:false,vault:true,required:false});
    }
    const matchingTemplate=await getPersonalTemplateFor(destination);
    if(matchingTemplate){
      await applyPersonalTemplate(trip.id,matchingTemplate.id);
      appliedTemplate=true;
    }
  } else if(tripType==='international' && !wasInternational){
    // trip was edited from domestic to international — add the visa task retroactively
    // if it isn't already there (e.g. from an earlier international->domestic->international flip)
    const existingTasks=await idAll('tasks',trip.id);
    const hasVisa=existingTasks.some(t=>t.title==='Upload visa copy');
    if(!hasVisa) await idPut('tasks',{id:uid(),tripId:trip.id,title:'Upload visa copy',note:'Not all destinations require one — delete if it doesn\u2019t apply',done:false,vault:true,required:false});
    toast('Trip updated — added a visa task');
    pickedSingle={}; closeSheet();
    nav({view:'trip',id:trip.id,tab:'tasks'});
    return;
  }
  pickedSingle={}; closeSheet(); toast(existing?'Trip updated':(appliedTemplate?'Trip created — applied your saved template':'Trip created'));
  nav({view:'trip',id:trip.id,tab:existing?(route.tab||'tasks'):'tasks'});
}
function confirmDeleteTrip(tripId){
  openSheet(`
    <h3>Delete this trip?</h3>
    <div class="field" style="color:var(--muted);font-size:13.5px;line-height:1.6;">
      This permanently deletes the trip and everything in it — tasks, packing list, expenses, activities, and any attached files. This can't be undone.
    </div>
    <div class="sheet-actions">
      <button class="btn ghost" onclick="openTripForm('${tripId}')">Cancel</button>
      <button class="btn primary" style="background:var(--rose);" onclick="deleteTrip('${tripId}')">Delete permanently</button>
    </div>`);
}
async function deleteTrip(tripId){
  const [tasks,packing,expenses,activities]=await Promise.all([
    idAll('tasks',tripId), idAll('packing',tripId), idAll('expenses',tripId), idAll('activities',tripId)
  ]);
  await Promise.all([
    ...tasks.map(t=>idDel('tasks',t.id)),
    ...packing.map(p=>idDel('packing',p.id)),
    ...expenses.map(e=>idDel('expenses',e.id)),
    ...activities.map(a=>idDel('activities',a.id))
  ]);
  await idDel('trips',tripId);
  closeSheet(); toast('Trip deleted');
  nav({view:'home'});
}

  const info=VISA_INFO[trip.destinationCountry];
  const label=info?VISA_STATUS_LABELS[info.status]:'Not in our reference list';
  const color=info?VISA_STATUS_COLOR[info.status]:'var(--muted)';
  let heldNote='';
  if(info && info.note){
    const visasRec=await idGet('meta','existingVisas');
    const held=(visasRec&&visasRec.value)||[];
    const keywordMap={'Schengen':['schengen'],'US B1/B2 (10yr)':['us visa','united states visa'],'UK Standard Visitor (5yr)':['uk visa'],'Canada (10yr)':['canada'],'Australia (subclass 600)':['australia']};
    const noteLower=info.note.toLowerCase();
    for(const hv of held){
      const keywords=keywordMap[hv.type]||[];
      if(keywords.some(k=>noteLower.includes(k))){
        heldNote=`<div class="t2" style="margin-top:6px;color:var(--teal);">You have a ${esc(hv.type)} visa on file${hv.expiryDate?', valid until '+fmtDate(hv.expiryDate):''} — check whether it applies to this trip.</div>`;
        break;
      }
    }
  }
  return `<div class="board" style="margin-bottom:14px;padding:14px;">
    <div style="display:flex;align-items:flex-start;gap:10px;">
      <span style="color:${color};flex:none;margin-top:2px;">${ICONS.alertTriangle}</span>
      <div>
        <div class="t1">Visa for ${esc(trip.destinationCountry)} <span class="req-badge">indicative only*</span></div>
        <div class="t2" style="font-weight:700;color:${color};margin-top:4px;">${esc(label)}${info&&info.note?' — '+esc(info.note):''}</div>
        ${heldNote}
        <div class="t2" style="margin-top:6px;">*Point-in-time reference, not authoritative — always verify with the destination's embassy or an official visa portal before booking. Rules change often and this list isn't exhaustive.</div>
      </div>
    </div>
  </div>`;
}

async function savePassportProfile(){

  const existing=await getPassportProfile();
  const record={key:'passport',expiryDate:expiryDate||(existing&&existing.expiryDate)||'',nationality};

  const checks=[...document.querySelectorAll('.visa-check:checked')];
  const expiryInputs=[...document.querySelectorAll('.visa-expiry-input')];
  const heldVisas=checks.map(cb=>{

  await idPut('meta',{key:'existingVisas',value:heldVisas});

  pendingPassportFile=null; closeSheet(); toast('Passport saved'); render();

    activity.airline=document.getElementById('f-airline').value.trim();
    activity.pnr=document.getElementById('f-pnr').value.trim();
    activity.from=document.getElementById('f-from').value.trim();
    activity.to=document.getElementById('f-to').value.trim();
  }
  if(type==='train'){
    activity.from=document.getElementById('f-train-from').value.trim();
    activity.to=document.getElementById('f-train-to').value.trim();
    activity.trainNumber=document.getElementById('f-train-num').value.trim();
    activity.seatNumbers=document.getElementById('f-train-seat').value.trim();
  }
  if(type==='stay'){
    activity.location=document.getElementById('f-location').value.trim();
    activity.checkIn=document.getElementById('f-checkin').value;
    activity.checkOut=document.getElementById('f-checkout').value;
    if(activity.checkIn&&activity.checkOut&&activity.checkOut<activity.checkIn){toast('Check-out is before check-in');return;}
    if(!activity.date&&activity.checkIn) activity.date=activity.checkIn;
  }
  if(type==='transport'){
    activity.transportMode=pickedSingle['f-transport-mode']||'Other';
    activity.from=document.getElementById('f-transport-from').value.trim();
    activity.to=document.getElementById('f-transport-to').value.trim();
    activity.bookingRef=document.getElementById('f-transport-ref').value.trim();
  }

  // cost -> linked expense (create/update/unlink)
  const costAmount=parseFloat(document.getElementById('f-cost-amount').value);
  const costCurrency=(document.getElementById('f-cost-currency').value.trim()||'').toUpperCase();
  const trip=await idGet('trips',tripId);
  if(costAmount){
    const expenseData={
      amount:costAmount,
      currency:costCurrency||trip.baseCurrency||'INR',
      date:activity.checkIn||activity.date||todayStr(),
      note:title,
      category:defaultCategoryForType(type),
      activityId:activity.id
    };
    if(activity.expenseId){
      await idPut('expenses',{id:activity.expenseId,tripId,...expenseData});
    } else {
      const newExpenseId=uid();
      await idPut('expenses',{id:newExpenseId,tripId,...expenseData});
      activity.expenseId=newExpenseId;
    }
  } else if(activity.expenseId){
    // cost cleared — unlink but keep the expense as a standalone record (financial history stays intact)
    const exp=await idGet('expenses',activity.expenseId);
    if(exp){ delete exp.activityId; await idPut('expenses',exp); }
    delete activity.expenseId;
  }

  await idPut('activities',activity);
  pickedSingle={}; pendingActivityFile=null; closeSheet(); toast(activityId?'Activity updated':'Activity added'); render();
}
async function deleteActivity(id){
  const item=await idGet('activities',id);
  if(item&&item.expenseId){
    const exp=await idGet('expenses',item.expenseId);
    if(exp){ delete exp.activityId; await idPut('expenses',exp); }
  }
  await idDel('activities',id);
  toast('Deleted'); render();
}
async function deleteExpense(id){
  const item=await idGet('expenses',id);
  if(item&&item.activityId){
    const act=await idGet('activities',item.activityId);
    if(act){ delete act.expenseId; await idPut('activities',act); }
  }
  await idDel('expenses',id);
  toast('Deleted'); render();
}

function viewFile(store,id,field){

    const file=item&&item[field];

    }
    const url=URL.createObjectURL(file);

    else { toast('Pop-up blocked — allow pop-ups for this site to view files'); }

/* ---------------- export / import ---------------- */
function fileToDataObj(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onloadend=()=>resolve({name:file.name,type:file.type,dataUrl:reader.result});
    reader.onerror=reject;
    reader.readAsDataURL(file);
  });
}
function dataObjToFile(obj){
  const [meta,base64]=obj.dataUrl.split(',');
  const mime=(meta.match(/data:(.*);base64/)||[])[1]||obj.type||'application/octet-stream';
  const binary=atob(base64);
  const bytes=new Uint8Array(binary.length);
  for(let i=0;i<binary.length;i++) bytes[i]=binary.charCodeAt(i);
  return new File([bytes],obj.name||'file',{type:mime});
}
/* ---------------- .ics calendar export ---------------- */
function icsEscape(s){
  return String(s||'').replace(/\\/g,'\\\\').replace(/;/g,'\\;').replace(/,/g,'\\,').replace(/\n/g,'\\n');
}
function icsAddDay(yyyymmdd){
  const y=+yyyymmdd.slice(0,4), m=+yyyymmdd.slice(4,6)-1, d=+yyyymmdd.slice(6,8);
  const dt=new Date(Date.UTC(y,m,d));
  dt.setUTCDate(dt.getUTCDate()+1);
  return dt.toISOString().slice(0,10).replace(/-/g,'');
}
function icsStamp(){
  return new Date().toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';
}
function activityToVEVENT(a){
  let dtstart,dtend,allDay=false;
  if(a.type==='stay' && a.checkIn){
    dtstart=a.checkIn.replace(/-/g,'');
    dtend=icsAddDay((a.checkOut||a.checkIn).replace(/-/g,''));
    allDay=true;
  } else if(a.date){
    const dNum=a.date.replace(/-/g,'');
    if(a.time){
      const [h,m]=a.time.split(':').map(Number);
      const end=new Date(a.date+'T'+a.time+':00');
      end.setHours(end.getHours()+1);
      dtstart=dNum+'T'+String(h).padStart(2,'0')+String(m).padStart(2,'0')+'00';
      dtend=dNum+'T'+String(end.getHours()).padStart(2,'0')+String(end.getMinutes()).padStart(2,'0')+'00';
    } else {
      dtstart=dNum;
      dtend=icsAddDay(dNum);
      allDay=true;
    }
  } else {
    return null;
  }
  let location='';
  const desc=[];
  if(a.type==='flight'){
    if(a.airline) desc.push('Airline: '+a.airline);
    if(a.pnr) desc.push('PNR: '+a.pnr);
    if(a.from||a.to) location=(a.from||'')+' \u2192 '+(a.to||'');
  }
  if(a.type==='train'){
    if(a.trainNumber) desc.push('Train #'+a.trainNumber);
    if(a.seatNumbers) desc.push('Seat: '+a.seatNumbers);
    if(a.from||a.to) location=(a.from||'')+' \u2192 '+(a.to||'');
  }
  if(a.type==='stay' && a.location) location=a.location;
  if(a.notes) desc.push(a.notes);

  const lines=[
    'BEGIN:VEVENT',
    'UID:'+a.id+'@compass-app',
    'DTSTAMP:'+icsStamp(),
    allDay?'DTSTART;VALUE=DATE:'+dtstart:'DTSTART:'+dtstart,
    allDay?'DTEND;VALUE=DATE:'+dtend:'DTEND:'+dtend,
    'SUMMARY:'+icsEscape(a.title||'Activity')
  ];
  if(location) lines.push('LOCATION:'+icsEscape(location));
  if(desc.length) lines.push('DESCRIPTION:'+icsEscape(desc.join('\n')));
  lines.push('END:VEVENT');
  return lines.join('\r\n');
}
function buildICS(vevents,calName){
  return ['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Compass//Travel Log//EN','CALSCALE:GREGORIAN',
    calName?'X-WR-CALNAME:'+icsEscape(calName):null,
    ...vevents,'END:VCALENDAR'].filter(Boolean).join('\r\n');
}
function downloadICS(content,filename){
  const blob=new Blob([content],{type:'text/calendar;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=filename; a.click();
  URL.revokeObjectURL(url);
  toast('Calendar file downloaded — open it to add to your calendar');
}
async function exportActivityICS(activityId){
  const a=await idGet('activities',activityId);
  const vevent=activityToVEVENT(a);
  if(!vevent){ toast('This needs a date before it can be added to your calendar'); return; }
  downloadICS(buildICS([vevent]), (a.title||'event').replace(/[^a-z0-9]+/gi,'-').toLowerCase()+'.ics');
}
async function exportTripICS(tripId){
  const trip=await idGet('trips',tripId);
  const activities=await idAll('activities',tripId);
  const vevents=activities.map(activityToVEVENT).filter(Boolean);
  if(!vevents.length){ toast('No dated activities to export yet'); return; }
  downloadICS(buildICS(vevents,trip.destination), (trip.destination||'trip').replace(/[^a-z0-9]+/gi,'-').toLowerCase()+'-itinerary.ics');
}
function csvEscape(v){
  const s=String(v==null?'':v);
  if(/[",\r\n]/.test(s)) return '"'+s.replace(/"/g,'""')+'"';
  return s;
}
async function exportExpensesCSV(tripId){
  const trip=await idGet('trips',tripId);
  const expenses=(await idAll('expenses',tripId)).sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  if(expenses.length===0){ toast('No expenses to export'); return; }
  const rows=[['Date','Category','Note','Amount','Currency','Receipt attached']];
  expenses.forEach(e=>{
    rows.push([e.date||'', catLabel(e.category), e.note||'', e.amount, e.currency||trip.baseCurrency||'INR', e.receipt?'Yes':'No']);
  });
  const totals=groupByCurrency(expenses);
  rows.push([]);
  Object.keys(totals).forEach(c=>rows.push(['','','Total ('+c+')','',totals[c].toFixed(2),'']));
  const csv=rows.map(r=>r.map(csvEscape).join(',')).join('\r\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const safeName=(trip.destination||'trip').replace(/[^a-z0-9]+/gi,'-').toLowerCase();
  a.href=url; a.download=safeName+'-expenses-'+todayStr()+'.csv'; a.click();
  URL.revokeObjectURL(url);
  toast('CSV exported');
}
async function exportData(){
  const [trips,tasksRaw,packing,expensesRaw,activitiesRaw,personalTemplates]=await Promise.all([
    idAll('trips'), idAll('tasks'), idAll('packing'), idAll('expenses'), idAll('activities'), idAll('personalTemplates')
  ]);
  const tasks=await Promise.all(tasksRaw.map(async t=>{
    if(t.file instanceof Blob){ return {...t, file:await fileToDataObj(t.file)}; }
    return t;
  }));
  const activities=await Promise.all(activitiesRaw.map(async a=>{
    if(a.ticketFile instanceof Blob){ return {...a, ticketFile:await fileToDataObj(a.ticketFile)}; }
    return a;
  }));
  const expenses=await Promise.all(expensesRaw.map(async e=>{
    if(e.receipt instanceof Blob){ return {...e, receipt:await fileToDataObj(e.receipt)}; }
    return e;
  }));
  const data={trips,tasks,packing,expenses,activities,personalTemplates,exportedAt:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(data)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download='compass-backup-'+todayStr()+'.json'; a.click();
  URL.revokeObjectURL(url);
  await idPut('meta',{key:'lastExportAt',value:new Date().toISOString()});
  toast('Backup downloaded');
  render();
}
async function importData(ev){
  const file=ev.target.files[0]; if(!file)return;
  const text=await file.text();
  try{
    const data=JSON.parse(text);
    for(const t of data.trips||[]) await idPut('trips',t);
    for(const t of data.tasks||[]){
      if(t.file && t.file.dataUrl) t.file=dataObjToFile(t.file);
      await idPut('tasks',t);
    }
    for(const p of data.packing||[]) await idPut('packing',p);
    for(const e of data.expenses||[]){
      if(e.receipt && e.receipt.dataUrl) e.receipt=dataObjToFile(e.receipt);
      await idPut('expenses',e);
    }
    for(const a of data.activities||[]){
      if(a.ticketFile && a.ticketFile.dataUrl) a.ticketFile=dataObjToFile(a.ticketFile);
      await idPut('activities',a);
    }
    for(const t of data.personalTemplates||[]) await idPut('personalTemplates',t);
    toast('Backup restored'); render();
  }catch(e){toast('Invalid backup file');}
  ev.target.value='';
}
